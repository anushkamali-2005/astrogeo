# DVC Pipeline Parameters
# This file contains all hyperparameters and configurations for the ML pipeline

# Data Ingestion
data_ingestion:
  source_type: "postgresql"  # postgresql, s3, gcs, local
  batch_size: 10000
  chunk_size: 5000
  cache_enabled: true
  cache_ttl: 3600
  validation_enabled: true
  
# Data Preprocessing
data_preprocessing:
  missing_threshold: 0.3
  outlier_method: "iqr"  # iqr, zscore, isolation_forest
  outlier_threshold: 3.0
  scaling_method: "standard"  # standard, minmax, robust
  encoding_method: "onehot"  # onehot, label, target
  feature_selection: true
  n_features: 50
  
# Geospatial Processing
geospatial:
  crs: "EPSG:4326"
  buffer_distance: 1000  # meters
  spatial_index: true
  simplify_tolerance: 0.0001
  geometry_types: ["Point", "Polygon", "LineString"]
  
# Feature Engineering
feature_engineering:
  polynomial_degree: 2
  interaction_features: true
  temporal_features: true
  geospatial_features: true
  aggregation_windows: [7, 14, 30]  # days
  
# Model Training - Random Forest
random_forest:
  n_estimators: 100
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: "sqrt"
  random_state: 42
  n_jobs: -1
  
# Model Training - XGBoost
xgboost:
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  gamma: 0
  reg_alpha: 0
  reg_lambda: 1
  random_state: 42
  
# Model Training - LightGBM
lightgbm:
  n_estimators: 100
  max_depth: -1
  learning_rate: 0.1
  num_leaves: 31
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42
  
# Model Training - Neural Network
neural_network:
  hidden_layers: [128, 64, 32]
  activation: "relu"
  dropout_rate: 0.3
  batch_size: 32
  epochs: 100
  learning_rate: 0.001
  optimizer: "adam"
  early_stopping_patience: 10
  
# Cross Validation
cross_validation:
  strategy: "stratified_kfold"  # kfold, stratified_kfold, time_series
  n_splits: 5
  shuffle: true
  random_state: 42
  
# Model Evaluation
model_evaluation:
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1"
    - "roc_auc"
    - "log_loss"
  threshold: 0.5
  generate_plots: true
  save_confusion_matrix: true
  save_feature_importance: true
  
# Hyperparameter Tuning
hyperparameter_tuning:
  enabled: false
  method: "optuna"  # optuna, grid_search, random_search
  n_trials: 50
  timeout: 3600  # seconds
  pruning_enabled: true
  
# MLflow Tracking
mlflow:
  experiment_name: "astrogeo-experiments"
  run_name_prefix: "run"
  log_models: true
  log_artifacts: true
  log_params: true
  log_metrics: true
  autolog_enabled: true
  
# Model Registry
model_registry:
  registry_name: "astrogeo-model-registry"
  staging_threshold: 0.85
  production_threshold: 0.90
  auto_promote: false
  versioning_enabled: true
  
# Monitoring
monitoring:
  enabled: true
  drift_detection: true
  drift_threshold: 0.1
  performance_threshold: 0.85
  alert_enabled: true
  
# Agentic AI
agents:
  temperature: 0.7
  max_iterations: 10
  timeout: 300  # seconds
  model: "gpt-4"
  embedding_model: "text-embedding-ada-002"
  vector_store: "chromadb"
  memory_enabled: true
  
# Data Agent
data_agent:
  max_query_results: 1000
  cache_queries: true
  explain_sql: true
  
# ML Agent
ml_agent:
  auto_train: false
  auto_tune: false
  model_comparison: true
  
# Geo Agent
geo_agent:
  default_crs: "EPSG:4326"
  simplification_enabled: true
  spatial_joins: true
  
# Database
database:
  pool_size: 20
  max_overflow: 10
  pool_timeout: 30
  pool_recycle: 3600
  echo: false
  
# API
api:
  rate_limit: 100  # requests per minute
  timeout: 30  # seconds
  max_batch_size: 100
  cache_enabled: true
  
# Deployment
deployment:
  replicas: 3
  cpu_limit: "1000m"
  memory_limit: "2Gi"
  cpu_request: "500m"
  memory_request: "1Gi"
  health_check_interval: 30
  
# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "json"
  rotation: "1 day"
  retention: "30 days"